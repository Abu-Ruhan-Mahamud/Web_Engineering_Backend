<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUROVA - Registration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: #E2E3EA;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* Main Hovering Card Container */
        .main-card {
            width: 90%;
            max-width: 1400px;
            height: 85vh;
            max-height: 900px;
            background: white;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            display: flex;
            overflow: hidden;
        }

        /* Left Side - Teal Background */
        .left-side {
            flex: 1;
            background: #74C3D0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            position: relative;
        }

        .logo-section {
            text-align: center;
        }

        .logo-icon {
            margin-bottom: 1.5rem;
        }

        .logo-icon svg {
            width: 140px;
            height: 140px;
        }

        .logo-text {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1e3a8a;
            margin-bottom: 0.8rem;
        }

        .tagline {
            font-size: 1.2rem;
            color: #1e3a8a;
            font-weight: 500;
        }

        /* Right Side - Registration Form */
        .right-side {
            flex: 1;
            background: #E2E3EA;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem;
        }

        .registration-form {
            width: 100%;
            max-width: 450px;
        }

        .card-title {
            font-size: 1.8rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.3rem;
        }

        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: #666;
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s;
            background: white;
        }

        .form-input:focus {
            outline: none;
            border-color: #74C3D0;
            box-shadow: 0 0 0 3px rgba(116, 195, 208, 0.1);
        }

        .form-input::placeholder {
            color: #9ca3af;
            font-size: 0.9rem;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            margin: 1.3rem 0;
        }

        .checkbox-input {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #74C3D0;
        }

        .checkbox-label {
            font-size: 0.85rem;
            color: #666;
            cursor: pointer;
            user-select: none;
            font-weight: 500;
        }

        .submit-btn {
            width: 100%;
            padding: 0.9rem;
            background: #17a2b8;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0.8rem;
        }

        .submit-btn:hover {
            background: #138496;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(23, 162, 184, 0.3);
        }

        .signin-text {
            text-align: center;
            margin-top: 1.3rem;
            font-size: 0.9rem;
            color: #666;
        }

        .signin-link {
            color: #17a2b8;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .signin-link:hover {
            color: #138496;
        }

        /* Decorative Elements */
        .left-side::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255,255,255,0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255,255,255,0.08) 0%, transparent 50%);
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .main-card {
                width: 95%;
                height: 90vh;
            }
        }

        @media (max-width: 968px) {
            body {
                padding: 1rem;
            }

            .main-card {
                flex-direction: column;
                height: auto;
                min-height: 90vh;
            }

            .left-side {
                padding: 2rem;
            }

            .logo-icon svg {
                width: 100px;
                height: 100px;
            }

            .logo-text {
                font-size: 2rem;
            }

            .tagline {
                font-size: 1rem;
            }

            .right-side {
                padding: 2rem 1.5rem;
            }

            .card-title {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 640px) {
            .main-card {
                border-radius: 25px;
            }

            .form-group {
                margin-bottom: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="main-card">
        <!-- Left Side - Branding -->
        <div class="left-side">
            <div class="logo-section">
                <div class="logo-icon">
                    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                        <!-- Medical Cross -->
                        <path d="M100 30 L100 90 L60 90 L60 110 L100 110 L100 170 L120 170 L120 110 L160 110 L160 90 L120 90 L120 30 Z" 
                              fill="#4A90E2" stroke="#2563EB" stroke-width="2"/>
                        
                        <!-- Person/Health Symbol -->
                        <circle cx="100" cy="120" r="12" fill="#10B981"/>
                        <path d="M100 135 Q85 145, 75 165 L125 165 Q115 145, 100 135 Z" fill="#10B981"/>
                        
                        <!-- Decorative Leaves -->
                        <path d="M85 145 Q70 150, 65 165" stroke="#34D399" stroke-width="4" fill="none" stroke-linecap="round"/>
                        <path d="M115 145 Q130 150, 135 165" stroke="#34D399" stroke-width="4" fill="none" stroke-linecap="round"/>
                        <path d="M75 155 Q68 160, 70 170" stroke="#34D399" stroke-width="3" fill="none" stroke-linecap="round"/>
                        <path d="M125 155 Q132 160, 130 170" stroke="#34D399" stroke-width="3" fill="none" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="logo-text">CUROVA</div>
                <div class="tagline">Health Support at Your Fingertips</div>
            </div>
        </div>

        <!-- Right Side - Registration Form -->
        <div class="right-side">
            <div class="registration-form">
                <h1 class="card-title">Set up your account</h1>
                
                <form id="registrationForm">
                    <div class="form-group">
                        <label class="form-label" for="fullName">FULL NAME</label>
                        <input 
                            type="text" 
                            id="fullName" 
                            class="form-input" 
                            placeholder="Enter your full name"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="mobile">MOBILE NUMBER</label>
                        <input 
                            type="tel" 
                            id="mobile" 
                            class="form-input" 
                            placeholder="Enter your mobile number"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="email">EMAIL ADDRESS</label>
                        <input 
                            type="email" 
                            id="email" 
                            class="form-input" 
                            placeholder="Enter valid email"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">PASSWORD</label>
                        <input 
                            type="password" 
                            id="password" 
                            class="form-input" 
                            placeholder="Enter your password"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="confirmPassword">CONFIRM PASSWORD</label>
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            class="form-input" 
                            placeholder="Re-enter your password"
                            required
                        >
                    </div>

                    <div class="checkbox-group">
                        <input 
                            type="checkbox" 
                            id="keepSignedIn" 
                            class="checkbox-input"
                        >
                        <label for="keepSignedIn" class="checkbox-label">KEEP ME SIGNED IN</label>
                    </div>

                    <button type="submit" class="submit-btn">Get Started</button>

                    <div class="signin-text">
                        Already have an account? <a href="#" class="signin-link">Sign in→</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }
            
            // Form submission logic here
            console.log('Form submitted successfully!');
            alert('Account created successfully!');
        });
    </script>
</body>
</html>
